<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Where the hell is Jeff?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@300;400&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1219;
      --surface: #1a1f2e;
      --border: rgba(255,255,255,0.06);
      --text: #e8e4df;
      --text-dim: rgba(255,255,255,0.4);
      --accent: #E87952;
      --accent-glow: rgba(232,121,82,0.3);
      --mono: 'JetBrains Mono', monospace;
      --sans: 'DM Sans', system-ui, sans-serif;
      --serif: 'Playfair Display', serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: linear-gradient(145deg, var(--surface) 0%, #151926 100%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s ease-out;
      text-align: center;
    }

    .label {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 32px;
    }

    h1 .accent { color: var(--accent); }

    .pin-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 20px;
      font-family: var(--mono);
      font-weight: 400;
      color: #fff;
      text-align: center;
      letter-spacing: 0.25em;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }

    .pin-input:focus {
      border-color: rgba(232,121,82,0.5);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .pin-input.error {
      border-color: rgba(255,80,80,0.5);
      box-shadow: 0 0 0 3px rgba(255,80,80,0.2);
    }

    .error-msg {
      font-size: 12px;
      color: rgba(255,100,100,0.8);
      font-family: var(--mono);
      margin-bottom: 14px;
      min-height: 16px;
    }

    .btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      font-family: var(--sans);
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label">Live Location</div>
    <h1>Where the hell is Jeff<span class="accent">?</span></h1>

    <form method="POST" action="/auth">
      <input
        class="pin-input" id="pin-input"
        type="text"
        name="pin"
        placeholder="PIN"
        maxlength="10"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
      />
      <div class="error-msg" id="error-msg"></div>
      <button class="btn" type="submit">Enter</button>
    </form>
  </div>

  <script>
    // Auto-uppercase input
    const input = document.getElementById("pin-input");
    input.addEventListener("input", () => {
      const pos = input.selectionStart;
      input.value = input.value.toUpperCase();
      input.setSelectionRange(pos, pos);
    });

    // Show error if redirected back with ?error=1
    if (new URLSearchParams(window.location.search).get("error") === "1") {
      input.classList.add("error");
      document.getElementById("error-msg").textContent = "Incorrect PIN. Try again.";
    }
  </script>
</body>
</html>
